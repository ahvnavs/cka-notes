apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-replicaset
  labels:
    app: myapp-pod
    type: proxy
spec:
  template:
    metadata:
      name: nginx-pod
      labels:
        app: nginx
        type: proxy
    spec:
      containers:
        - name: nginx-container
          image: nginx
  replicas: 2
  selector:
    matchLabels:
      type: proxy
